<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function restrict (){
        let age = Number(document.getElementById("age").value)
        if(age < 10) {alert("No!")}
        else{alert ("yes!")}
    }
    </script>
</head>
<body>
    <label for="age">whats you'r age?</label>
    <input type="number" name="age" id="age">
    <button onclick="restrict()">check</button>
    
</body>
</html>
